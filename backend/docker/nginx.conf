# ============================================================
#  Klika ERP · nginx (3 server blocks en 1 contenedor)
#
#  Puerto 80   → API Laravel  (uso interno entre contenedores)
#  Puerto 8082 → ERP web      → erp.techosestrella.com
#  Puerto 8083 → PWA campo    → campo.techosestrella.com
#  Puerto 8084 → Portal       → portal.techosestrella.com
# ============================================================

# ----- 1. API Laravel (PHP-FPM) --------------------------------
server {
    listen 80;
    root /var/www/html/public;
    index index.php;
    client_max_body_size 20M;

    location /storage {
        alias /var/www/html/storage/app/public;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    location ~ /\.(?!well-known).* { deny all; }

    access_log /var/log/nginx/api_access.log;
    error_log  /var/log/nginx/api_error.log;
}

# Macro reutilizable: proxy /api y /storage al backend Laravel
# (se incluye en los bloques del frontend)
map $uri $fastcgi_script {
    default /var/www/html/public/index.php;
}

# ----- 2. ERP web → empleados ----------------------------------
server {
    listen 8082;
    root /var/www/frontend;
    index "Klika ERP.html";
    client_max_body_size 20M;

    # API Laravel (va directo a PHP-FPM para evitar doble proxy)
    location /api {
        include        fastcgi_params;
        fastcgi_pass   app:9000;
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param  REQUEST_URI     $request_uri;
        fastcgi_param  DOCUMENT_ROOT   /var/www/html/public;
    }

    # Archivos subidos (fotos de obra)
    location /storage {
        alias /var/www/html/storage/app/public;
    }

    # Archivos estáticos; fallback al HTML principal
    location / {
        try_files $uri "Klika ERP.html";
    }

    access_log /var/log/nginx/erp_access.log;
    error_log  /var/log/nginx/erp_error.log;
}

# ----- 3. PWA campo → aplicadores ------------------------------
server {
    listen 8083;
    root /var/www/campo;
    client_max_body_size 20M;

    location /api {
        include        fastcgi_params;
        fastcgi_pass   app:9000;
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param  REQUEST_URI     $request_uri;
        fastcgi_param  DOCUMENT_ROOT   /var/www/html/public;
    }

    location /storage {
        alias /var/www/html/storage/app/public;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/campo_access.log;
    error_log  /var/log/nginx/campo_error.log;
}

# ----- 4. Portal del cliente → acceso público ------------------
server {
    listen 8084;
    root /var/www/portal;
    client_max_body_size 5M;

    location /api {
        include        fastcgi_params;
        fastcgi_pass   app:9000;
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param  REQUEST_URI     $request_uri;
        fastcgi_param  DOCUMENT_ROOT   /var/www/html/public;
    }

    location /storage {
        alias /var/www/html/storage/app/public;
    }

    location / {
        try_files $uri /index.html;
    }

    access_log /var/log/nginx/portal_access.log;
    error_log  /var/log/nginx/portal_error.log;
}
