name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend · tests + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite, sqlite3, mbstring, bcmath, gd, zip, exif, intl
          coverage: none

      - name: Cache de Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}

      - name: Instalar dependencias
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Preparar entorno
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint PHP (php -l)
        run: find app routes database -name '*.php' -print0 | xargs -0 -n1 php -l > /dev/null

      - name: Tests (PHPUnit, sqlite en memoria)
        run: php artisan test
