# Klika ERP · stack de producción (para Unraid u otro host Docker)
#
# Primer arranque:
#   cp backend/.env.docker backend/.env   # ajusta APP_KEY y contraseñas
#   docker compose build
#   docker compose up -d
#   docker compose exec app php artisan key:generate
#   docker compose exec app php artisan migrate --seed
#   docker compose exec app php artisan storage:link
#
# El ERP queda en http://HOST:8080

services:
  app:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db                # ← nombre del servicio MySQL (sobrescribe .env)
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-klika}
      DB_USERNAME: ${DB_USERNAME:-klika}
      DB_PASSWORD: ${DB_PASSWORD:-klika_secret}
    volumes:
      - storage-data:/var/www/html/storage/app/public   # fotos persistentes

  web:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - storage-data:/var/www/html/storage/app/public:ro

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-klika}
      MYSQL_USER: ${DB_USERNAME:-klika}
      MYSQL_PASSWORD: ${DB_PASSWORD:-klika_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3307:3306"            # expuesto por si quieres conectarte con un cliente
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  storage-data:
